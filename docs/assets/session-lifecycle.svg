<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 900" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00110c"/>
      <stop offset="100%" stop-color="#002d20"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#013b29"/>
      <stop offset="100%" stop-color="#012418"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00d68f"/>
    </marker>
    <filter id="glow2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1040" height="900" fill="url(#bg2)"/>
  <text x="520" y="38" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">How the Agent Manages Portfolio State</text>
  <text x="520" y="60" text-anchor="middle" fill="#7fd9bd" font-size="13">One session_id ↔ one PortfolioSession(holdings, history) — in-memory, TTL-evicted</text>

  <!-- Stage 1: Ingest -->
  <g filter="url(#glow2)">
    <rect x="60" y="90" width="920" height="110" rx="14" fill="url(#lane)" stroke="#00885e" stroke-width="1.5"/>
  </g>
  <text x="90" y="118" fill="#ffffff" font-size="15" font-weight="700">1 · Initial ingest</text>
  <text x="90" y="142" fill="#d9f2e6" font-size="12">POST /api/portfolio/ingest[/file|/images] → ingest_portfolio() → validate_holdings()</text>
  <text x="90" y="162" fill="#d9f2e6" font-size="12">calculate_weights() normalizes to sum=1.0 → set_portfolio(session_id, holdings)</text>
  <text x="90" y="182" fill="#a6ffdf" font-size="12" font-weight="600">get_portfolio_baseline() runs the FULL math suite once → session created with holdings + baseline ready</text>

  <line x1="520" y1="200" x2="520" y2="230" stroke="#00d68f" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Stage 2: session store -->
  <g filter="url(#glow2)">
    <rect x="300" y="230" width="440" height="80" rx="14" fill="#013a26" stroke="#00d68f" stroke-width="1.6"/>
  </g>
  <text x="520" y="258" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">PortfolioSession (session_store.py)</text>
  <text x="520" y="280" text-anchor="middle" fill="#a6ffdf" font-size="12">holdings: list[dict]   ·   history: list[dict]</text>
  <text x="520" y="298" text-anchor="middle" fill="#6fae94" font-size="10.5">TTLCache — max 500 sessions, 1h inactivity eviction</text>

  <line x1="520" y1="310" x2="520" y2="340" stroke="#00d68f" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Stage 3: chat turn -->
  <g filter="url(#glow2)">
    <rect x="60" y="340" width="920" height="100" rx="14" fill="url(#lane)" stroke="#00885e" stroke-width="1.5"/>
  </g>
  <text x="90" y="368" fill="#ffffff" font-size="15" font-weight="700">2 · Every chat turn</text>
  <text x="90" y="392" fill="#d9f2e6" font-size="12">POST /api/chat → check_injection() → session = get_or_create_session(id)</text>
  <text x="90" y="412" fill="#d9f2e6" font-size="12">_current_holdings = session.holdings   (injected into module-level tool context for this request)</text>
  <text x="90" y="430" fill="#d9f2e6" font-size="12">agent.invoke(message, chat_history[-10:])  →  LLM decides which tool to call</text>

  <line x1="290" y1="440" x2="290" y2="470" stroke="#00d68f" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="750" y1="440" x2="750" y2="470" stroke="#00d68f" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="180" y="460" fill="#6fae94" font-size="11">read-only path</text>
  <text x="640" y="460" fill="#ffb86b" font-size="11" font-weight="600">state-mutating path (new)</text>

  <!-- Stage 4a: read tool -->
  <g filter="url(#glow2)">
    <rect x="60" y="470" width="440" height="150" rx="14" fill="url(#lane)" stroke="#0f5c40" stroke-width="1.5"/>
  </g>
  <text x="280" y="496" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Math tool (6 of them)</text>
  <text x="90" y="522" fill="#d9f2e6" font-size="11.5">calculate_performance / get_risk_metrics /</text>
  <text x="90" y="540" fill="#d9f2e6" font-size="11.5">get_diversification / simulate_trade /</text>
  <text x="90" y="558" fill="#d9f2e6" font-size="11.5">get_correlation_matrix_tool / get_portfolio_allocation</text>
  <text x="90" y="584" fill="#a6ffdf" font-size="11.5">Reads _current_holdings, computes via</text>
  <text x="90" y="600" fill="#a6ffdf" font-size="11.5">math_engine/, returns raw dict — session</text>
  <text x="90" y="600" fill="#a6ffdf" font-size="11.5"></text>
  <text x="90" y="614" fill="#6fae94" font-size="10.5">holdings are NOT modified</text>

  <!-- Stage 4b: update tool -->
  <g filter="url(#glow2)">
    <rect x="540" y="470" width="440" height="150" rx="14" fill="#0e2e22" stroke="#ffb86b" stroke-width="1.6"/>
  </g>
  <text x="760" y="496" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">update_portfolio tool ★</text>
  <text x="565" y="522" fill="#ffe9d1" font-size="11.5">Fires when the message looks like new</text>
  <text x="565" y="540" fill="#ffe9d1" font-size="11.5">holdings data instead of a question</text>
  <text x="565" y="562" fill="#ffe9d1" font-size="11.5">ingest_portfolio(text) → calculate_weights()</text>
  <text x="565" y="580" fill="#ffe9d1" font-size="11.5">→ set_portfolio(session_id, new_holdings)</text>
  <text x="565" y="598" fill="#ffb86b" font-size="11.5" font-weight="700">→ _current_holdings overwritten in place</text>
  <text x="565" y="614" fill="#ffb86b" font-size="10.5">→ get_portfolio_baseline() recomputed fresh</text>

  <line x1="280" y1="620" x2="280" y2="650" stroke="#00d68f" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="760" y1="620" x2="760" y2="650" stroke="#ffb86b" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Stage 5: response assembly -->
  <g filter="url(#glow2)">
    <rect x="60" y="650" width="920" height="110" rx="14" fill="url(#lane)" stroke="#00885e" stroke-width="1.5"/>
  </g>
  <text x="90" y="678" fill="#ffffff" font-size="15" font-weight="700">3 · Response assembly (ground truth over LLM self-consistency)</text>
  <text x="90" y="702" fill="#d9f2e6" font-size="12">parse_llm_output() validates ChatResponse JSON · _last_tool_called() finds which tool actually ran</text>
  <text x="90" y="722" fill="#d9f2e6" font-size="12">canvas_state.view/data overwritten from the tool's real return value (never trusts the LLM's transcription)</text>
  <text x="90" y="744" fill="#ffb86b" font-size="12" font-weight="600">if last tool == update_portfolio and succeeded → response.portfolio_update = {holdings, baseline, count}</text>

  <line x1="520" y1="760" x2="520" y2="790" stroke="#00d68f" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Stage 6: frontend -->
  <g filter="url(#glow2)">
    <rect x="60" y="790" width="920" height="90" rx="14" fill="#013a26" stroke="#00d68f" stroke-width="1.6"/>
  </g>
  <text x="90" y="818" fill="#ffffff" font-size="15" font-weight="700">4 · Frontend refresh — no reset, no navigation</text>
  <text x="90" y="842" fill="#d9f2e6" font-size="12">SSE: event: token (prose) → event: canvas (view+data) → event: portfolio_update (if fired)</text>
  <text x="90" y="862" fill="#a6ffdf" font-size="12">App.jsx updates holdings/baseline state live · chat thread and canvas stay exactly where they were</text>
</svg>
