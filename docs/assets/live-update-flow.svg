<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 220" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00110c"/>
      <stop offset="100%" stop-color="#002d20"/>
    </linearGradient>
    <style>
      .node { fill: #013b29; stroke: #00885e; stroke-width: 1.6; }
      .label { fill: #eafff5; font-size: 13px; font-weight: 600; text-anchor: middle; }
      .sub { fill: #7fd9bd; font-size: 10.5px; text-anchor: middle; }
      .path { fill: none; stroke: #0f5c40; stroke-width: 3; }
      .pulse {
        fill: none;
        stroke: #00ffb0;
        stroke-width: 3;
        stroke-dasharray: 40 700;
        animation: flow 3.2s linear infinite;
      }
      .dot {
        fill: #00ffb0;
        filter: drop-shadow(0 0 6px #00ffb0);
        animation: dotmove 3.2s linear infinite;
        offset-rotate: 0deg;
      }
      @keyframes flow {
        0%   { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -740; }
      }
      @keyframes dotmove {
        0%   { offset-distance: 0%; opacity: 0; }
        5%   { opacity: 1; }
        95%  { opacity: 1; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      .stage-pop {
        animation: pop 3.2s ease-in-out infinite;
      }
      .stage-pop.d1 { animation-delay: 0s; }
      .stage-pop.d2 { animation-delay: 0.7s; }
      .stage-pop.d3 { animation-delay: 1.5s; }
      .stage-pop.d4 { animation-delay: 2.3s; }
      @keyframes pop {
        0%, 100% { transform: scale(1); }
        8%  { transform: scale(1.05); }
        16% { transform: scale(1); }
      }
    </style>
  </defs>

  <rect width="1000" height="220" fill="url(#bg3)"/>
  <text x="500" y="28" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">Mid-chat portfolio update — live, in one turn</text>

  <path id="flowpath" class="path" d="M 110 130 L 340 130 L 340 130 L 570 130 L 570 130 L 800 130" />
  <path class="pulse" d="M 110 130 L 340 130 L 340 130 L 570 130 L 570 130 L 800 130" />
  <circle class="dot" r="6" cx="110" cy="130">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M 110 130 L 340 130 L 340 130 L 570 130 L 570 130 L 800 130"/>
  </circle>

  <!-- Stage 1 -->
  <g class="stage-pop d1">
    <rect class="node" x="30" y="80" width="160" height="90" rx="12"/>
    <text class="label" x="110" y="115">"Here's my new</text>
    <text class="label" x="110" y="132">portfolio: 50%</text>
    <text class="label" x="110" y="149">INFY, 30% HDFC…"</text>
    <text class="sub" x="110" y="165">user chat message</text>
  </g>

  <!-- Stage 2 -->
  <g class="stage-pop d2">
    <rect class="node" x="260" y="80" width="160" height="90" rx="12"/>
    <text class="label" x="340" y="120">update_portfolio</text>
    <text class="label" x="340" y="138">tool fires</text>
    <text class="sub" x="340" y="160">agent recognizes holdings</text>
    <text class="sub" x="340" y="172">data, not a question</text>
  </g>

  <!-- Stage 3 -->
  <g class="stage-pop d3">
    <rect class="node" x="490" y="80" width="160" height="90" rx="12"/>
    <text class="label" x="570" y="115">session.holdings</text>
    <text class="label" x="570" y="132">overwritten +</text>
    <text class="label" x="570" y="149">baseline recomputed</text>
    <text class="sub" x="570" y="165">set_portfolio()</text>
  </g>

  <!-- Stage 4 -->
  <g class="stage-pop d4">
    <rect class="node" x="720" y="80" width="160" height="90" rx="12"/>
    <text class="label" x="800" y="115">Overview + badge</text>
    <text class="label" x="800" y="132">refresh live</text>
    <text class="sub" x="800" y="155">portfolio_update SSE event</text>
    <text class="sub" x="800" y="167">no reset, same thread</text>
  </g>

  <text x="500" y="205" text-anchor="middle" fill="#4d8a72" font-size="10.5">agent.py → guardrails.py → main.py (SSE) → App.jsx, all within a single /api/chat turn</text>
</svg>
